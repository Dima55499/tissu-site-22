<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tissu Store | Design Tipografic</title>
    
    <style>
        /* Reset și Variabile de Brand */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-neutral: #FFFFFF;      /* 60% din design */
            --text-primary: #000505;    /* 30% - Titluri, text important */
            --text-secondary: #6D6D6D;  /* Gri pentru lizibilitate */
            --accent-color: #E63946;    /* 10% Roșu chirurgical */
            
            /* COMBINAȚIA DE FONTURI (Fără biblioteci externe) */
            /* 1. Font Display/Titluri: Serif elegant, stil revistă de modă */
            --font-serif: "Didot", "Bodoni MT", "Cinzel", "Georgia", serif;
            
            /* 2. Font UI/Navigație: Neo-grotesque, geometric, curat */
            --font-sans-alt: "Helvetica Neue", "Arial", sans-serif;
            
            /* 3. Font Corp Text: Modern, ultra-lizibil pe ecrane mici */
            --font-body: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-neutral);
            color: var(--text-primary);
            font-family: var(--font-body);
            line-height: 1.7;
            -webkit-font-smoothing: antialiased;
        }

        /* Blocare scroll când pop-up-ul e activ */
        body.modal-open {
            overflow: hidden;
        }

        /* HEADER & NAVIGAȚIE */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 2.5rem 10%;
            background-color: var(--bg-neutral);
        }

        .logo {
            font-family: var(--font-serif);
            font-size: 2.2rem;
            font-weight: 700;
            letter-spacing: -1px;
            color: var(--text-primary);
        }

        nav a {
            text-decoration: none;
            color: var(--text-secondary);
            font-family: var(--font-sans-alt);
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-left: 2.5rem;
            transition: color 0.3s ease;
        }

        nav a:hover, nav a.active {
            color: var(--text-primary);
        }

        /* HERO SECTION (Punctul focal) */
        .hero {
            padding: 8rem 10% 10rem 10%;
            max-width: 1400px;
        }

        /* Contrast masiv: Serif, Uriaș, Elegant, Bold */
        .hero h1 {
            font-family: var(--font-serif);
            font-size: 6.5rem;
            font-weight: 700;
            line-height: 1.0;
            margin-bottom: 2.5rem;
            color: var(--text-primary);
            word-wrap: break-word;
        }

        /* Corp de text: Sans-serif, aerisit, ușor de citit */
        .hero p {
            font-family: var(--font-body);
            font-size: 1.25rem;
            color: var(--text-secondary);
            max-width: 550px;
            margin-bottom: 3.5rem;
            font-weight: 400;
        }

        /* BUTON ACCENT (10%) */
        .btn-accent {
            display: inline-block;
            background-color: var(--accent-color);
            color: var(--bg-neutral);
            padding: 1.2rem 2.8rem;
            text-decoration: none;
            font-family: var(--font-sans-alt);
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            border: none;
            cursor: pointer;
            transition: transform 0.2s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.2s;
        }

        .btn-accent:hover {
            opacity: 0.95;
            transform: translateY(-3px);
        }

        /* SECȚIUNI INFORMATIVE */

            padding: 7rem 10%;
            border-top: 1px solid #F0F0F0;
        }

        .section-grid {
            display: grid;
            grid-template-columns: 1fr 1.2fr;
            gap: 5rem;
        }

            font-family: var(--font-serif);
            font-size: 2.8rem;
            font-weight: 700;
            line-height: 1.2;
        }
